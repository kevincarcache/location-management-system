[mcp_servers.nuxt_mcp]
enabled = true
url = "https://nuxt.com/mcp"

[mcp_servers.vuetify_mcp]
enabled = true
url = "https://mcp.vuetifyjs.com/mcp"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "."]
cwd = "."

[mcp_servers.git]
command = "uvx"
args = ["mcp-server-git", "--repository", "."]
cwd = "."

[mcp_servers.postgres]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres", "postgresql://postgres:postgres@localhost:5432/locations"]
cwd = "."
